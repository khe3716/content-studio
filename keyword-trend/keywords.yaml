# 금융 비교 블로그 시작 카테고리 픽업용 키워드 그룹
# 네이버 데이터랩 검색어 트렌드 API 입력
# 한 그룹당 최대 20개 키워드, 한 호출당 최대 5개 그룹

groups:
  - name: 카드
    keywords:
      - 신용카드 추천
      - 체크카드 추천
      - 카드 비교
      - 주유 카드
      - 항공 마일리지 카드

  - name: 대출
    keywords:
      - 마이너스통장
      - 신용대출
      - 전세자금대출
      - 주택담보대출
      - 대환대출

  - name: 보험
    keywords:
      - 실손보험
      - 암보험
      - 운전자보험
      - 어린이보험
      - 보험 비교

  - name: 적금
    keywords:
      - 고금리 적금
      - 파킹통장
      - 정기예금
      - 청년도약계좌
      - ISA 계좌
