name: 재테크 발행글 매월 재발행 (최신 금리 반영)

on:
  workflow_dispatch:
    inputs:
      categories:
        description: '카테고리 (쉼표 구분, 비우면 savings,deposit 기본)'
        required: false
        default: 'savings,deposit'
      dry_run:
        description: 'Dry run (실제 발행 X)'
        required: false
        default: false
        type: boolean

  # 매월 1일 KST 09:00 (UTC 00:00) — refresh-finance-rates(02:00)가 끝난 뒤 7시간 후
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  republish:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 글 여러 개 재발행 시 시간 충분히

    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 2. Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. 의존성 설치
        run: npm ci

      - name: 3-1. 한국어 폰트
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f

      - name: 4. 매월 재발행 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_DATALAB_CLIENT_ID: ${{ secrets.NAVER_DATALAB_CLIENT_ID }}
          NAVER_DATALAB_CLIENT_SECRET: ${{ secrets.NAVER_DATALAB_CLIENT_SECRET }}
          FSS_FINLIFE_API_KEY: ${{ secrets.FSS_FINLIFE_API_KEY }}
          FINANCE_BLOG_ID: ${{ secrets.FINANCE_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: |
          ARGS=""
          if [ -n "${{ inputs.categories }}" ]; then
            ARGS="$ARGS --categories ${{ inputs.categories }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/finance-team/republish-all.js $ARGS

      - name: 5. 산출물 커밋
        if: success() && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add finance-blog/research/*.json finance-blog/drafts/*.html finance-blog/drafts/*.json finance-blog/images/*.jpg finance-blog/thumbnails/*.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "chore(finance): 매월 1일 자동 재발행 [skip ci]"
            git push
          fi

      - name: 6. 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          node -e "
            fetch('https://api.telegram.org/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendMessage', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({
                chat_id: process.env.TELEGRAM_CHAT_ID,
                text: '🚨 재테크 매월 재발행 실패\\n로그: ' + process.env.RUN_URL
              })
            });
          "
