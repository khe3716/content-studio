name: 과일 블로그 자동 발행

on:
  workflow_dispatch:
    inputs:
      day:
        description: '특정 Day 번호 (비우면 ready 상태인 다음 주제 자동 선택)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (글만 생성, Blogger 업로드 안 함)'
        required: false
        type: boolean
        default: false

  # 자동 스케줄: 매일 오후 6시 KST (UTC 09:00)
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 0. 자동 스케줄 시작일 체크 (2026-04-21 화요일 이전엔 skip)
        id: date_guard
        env:
          TZ: Asia/Seoul
          EVENT: ${{ github.event_name }}
        run: |
          today=$(date +%Y%m%d)
          start_date="20260421"
          if [ "$EVENT" = "schedule" ] && [ "$today" -lt "$start_date" ]; then
            echo "📅 $today < $start_date: 스케줄 시작일 전이라 스킵"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ 실행 진행 (event=$EVENT, today=$today)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 1. 코드 체크아웃
        if: steps.date_guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 2. Node.js 설치
        if: steps.date_guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. 의존성 설치
        if: steps.date_guard.outputs.skip != 'true'
        run: npm ci

      - name: 3-1. 한국어 폰트 설치 (썸네일용)
        if: steps.date_guard.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f

      - name: 3-2. 네이버 스마트스토어 상품 목록 갱신 (옵션)
        if: steps.date_guard.outputs.skip != 'true'
        continue-on-error: true
        env:
          NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
          NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
        run: |
          node scripts/test-naver-commerce.js 2>&1 | tail -5 || echo "네이버 API 실패 (무시하고 진행)"

      - name: 4. 박과일 로봇 실행 (auto-publish-fruit.js)
        if: steps.date_guard.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRUIT_BLOG_ID: ${{ secrets.FRUIT_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: |
          ARGS=""
          if [ -n "${{ inputs.day }}" ]; then
            ARGS="$ARGS --day ${{ inputs.day }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "실행: node auto-publish-fruit.js $ARGS"
          node auto-publish-fruit.js $ARGS

      - name: 5. 업데이트된 파일 커밋
        if: steps.date_guard.outputs.skip != 'true' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add fruit-blog/topics.yaml fruit-blog/drafts/*.html fruit-blog/thumbnails/*.png fruit-blog/thumbnails/*.svg fruit-blog/products.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경사항 없음, 커밋 스킵"
          else
            git commit -m "chore: auto-publish fruit draft + products [skip ci]"
            git push
          fi

      - name: 6. 실패 시 텔레그램 알림 (안전망)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿 없음, 알림 스킵"
            exit 0
          fi
          node -e "
            fetch('https://api.telegram.org/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendMessage', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({
                chat_id: process.env.TELEGRAM_CHAT_ID,
                text: '🚨 <b>과일블로그 워크플로 실패</b>\n\n로그:\n' + process.env.RUN_URL,
                parse_mode: 'HTML',
                disable_web_page_preview: true
              })
            }).then(r => r.json()).then(j => console.log(JSON.stringify(j)));
          "
