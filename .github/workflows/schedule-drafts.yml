name: 쌓인 DRAFT 예약 발행 배정

on:
  workflow_dispatch:
    inputs:
      blog:
        description: '블로그 선택 (economy 또는 fruit)'
        required: true
        type: choice
        options:
          - economy
          - fruit
        default: fruit
      start_offset:
        description: '시작 오프셋 (0=오늘부터, 1=내일부터)'
        required: false
        type: string
        default: '0'
      limit:
        description: '처리할 최대 편수 (비우면 전체)'
        required: false
        type: string
      dry_run:
        description: '배정만 확인 (실제 예약 X)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. 의존성 설치
        run: npm ci

      - name: 4. 예약 배정 실행
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          FRUIT_BLOG_ID: ${{ secrets.FRUIT_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: |
          ARGS="--blog ${{ inputs.blog }}"
          if [ -n "${{ inputs.start_offset }}" ]; then
            ARGS="$ARGS --start-offset ${{ inputs.start_offset }}"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "실행: node scripts/schedule-drafts.js $ARGS"
          node scripts/schedule-drafts.js $ARGS

      - name: 5. 실패 시 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          node -e "
            fetch('https://api.telegram.org/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendMessage', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({
                chat_id: process.env.TELEGRAM_CHAT_ID,
                text: '🚨 <b>예약 배정 워크플로 실패</b>\n\n로그: ' + process.env.RUN_URL,
                parse_mode: 'HTML',
                disable_web_page_preview: true
              })
            }).then(r => r.json()).then(j => console.log(j));
          "
